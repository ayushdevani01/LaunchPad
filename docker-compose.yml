version: '3.8'

services:

  mongodb:
    image: mongo:latest
    container_name: launchpad-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - launchpad-network
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: launchpad-redis
    command: redis-server --bind 0.0.0.0 --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - launchpad-network
    restart: on-failure

  localstack:
    image: localstack/localstack:latest
    container_name: launchpad-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init:/etc/localstack/init/ready.d"
    networks:
      - launchpad-network
    restart: on-failure

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
      args:
        INSTALL_DOCKER: "true"
    container_name: launchpad-api
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      - REDIS_URL=${REDIS_URL:-redis://:redis_pass@redis:6379}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/launchpad}
      - JWT_SECRET=${JWT_SECRET:-jwt_secret_phrase}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-http://localhost:9000/auth/github/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-mock}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-mock}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-launchpad-assets}
      - AWS_ECS_CLUSTER=${AWS_ECS_CLUSTER:-local}
      - AWS_ECS_TASK_DEFINITION=${AWS_ECS_TASK_DEFINITION:-mock-task}
      - AWS_ECS_SUBNETS=${AWS_ECS_SUBNETS:-mock-subnet}
      - AWS_ECS_SECURITY_GROUPS=${AWS_ECS_SECURITY_GROUPS:-mock-sg}
      - AWS_ECS_CONTAINER_NAME=${AWS_ECS_CONTAINER_NAME:-build-server}
      - AWS_ENDPOINT=${AWS_ENDPOINT}
      - MOCK_ECS=${MOCK_ECS:-true}
      - DOCKER_NETWORK=launchpad-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - launchpad-network
    depends_on:
      - mongodb
      - redis
      - localstack
    restart: on-failure

  logs-service:
    build:
      context: ./logs-service
      dockerfile: Dockerfile
    container_name: launchpad-logs
    ports:
      - "9002:9002"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379
      - SOCKET_PORT=9002
      - JWT_SECRET=${JWT_SECRET:-jwt_secret_phrase}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/launchpad}
    networks:
      - launchpad-network
    depends_on:
      - redis
      - mongodb
    restart: on-failure

  reverse-proxy:
    build:
      context: ./s3-reverse-proxy
      dockerfile: Dockerfile
    container_name: launchpad-proxy
    ports:
      - "8000:8000"
    environment:
      - BASE_PATH=${BASE_PATH}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/launchpad}
    networks:
      - launchpad-network
    depends_on:
      - mongodb
      - localstack
    restart: on-failure

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: launchpad-gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN:-mock}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - launchpad-network
    depends_on:
      - api-server
      - logs-service
      - reverse-proxy
    restart: on-failure

networks:
  launchpad-network:
    driver: bridge
    name: launchpad-network

volumes:
  redis-data:
  mongo-data:
  caddy-data:
  caddy-config:
